# .github/workflows/build-windows.yml

name: Build Windows

on:
  workflow_dispatch:
    inputs:
      config:
        description: "CMake build configuration"
        required: false
        default: "RelWithDebInfo"
        type: choice
        options:
          - RelWithDebInfo
          - Release
          - Debug
      csound_ref:
        description: "Csound branch or tag to build"
        required: false
        default: "develop"

permissions:
  contents: write

env:
  BUILD_TYPE: ${{ inputs.config || 'RelWithDebInfo' }}
  CSOUND_VERSION_REF: ${{ inputs.csound_ref || 'develop' }}
  CSOUND_CACHE_VERSION: csound7-develop-v7-msvc

jobs:
  build:
    name: Windows x64 Build
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      CSOUND_INSTALL_PREFIX: ${{ github.workspace }}/.cache/csound-install

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect Visual Studio generator
        id: detect-vs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found" }
          $installPath = & $vswhere -latest -property installationPath
          $version     = & $vswhere -latest -property catalog_productLineVersion
          Write-Host "VS path: $installPath"
          Write-Host "VS version: $version"
          switch ($version) {
            "2022" { $generator = "Visual Studio 17 2022" }
            "2026" { $generator = "Visual Studio 18 2026" }
            default { $generator = "Visual Studio 18 2026" }
          }
          Write-Host "Generator: $generator"
          "generator=$generator" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install Windows dependencies
        shell: pwsh
        run: choco install -y winflexbison3 7zip

      # ── NEW: install curl via runner's vcpkg ──
      - name: Install libcurl via vcpkg
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vcpkgExe = "C:\vcpkg\vcpkg.exe"
          if (-not (Test-Path $vcpkgExe)) { throw "vcpkg not found at $vcpkgExe" }
          & $vcpkgExe install curl:x64-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Installed curl at C:\vcpkg\installed\x64-windows"
          Get-ChildItem "C:\vcpkg\installed\x64-windows\lib" -Filter "libcurl*" -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "  lib: $($_.Name)" }

      - name: Resolve Csound commit SHA
        id: csound-source
        shell: bash
        run: |
          set -euo pipefail
          csound_sha="$(git ls-remote https://github.com/csound/csound.git "refs/heads/${CSOUND_VERSION_REF}" | awk '{print $1}')"
          if [[ -z "${csound_sha}" ]]; then
            csound_sha="$(git ls-remote https://github.com/csound/csound.git "refs/tags/${CSOUND_VERSION_REF}" | awk '{print $1}')"
          fi
          if [[ -z "${csound_sha}" ]]; then
            echo "::error::Could not resolve Csound ref: ${CSOUND_VERSION_REF}"
            exit 1
          fi
          echo "sha=${csound_sha}" >> "${GITHUB_OUTPUT}"
          echo "Csound ${CSOUND_VERSION_REF} -> ${csound_sha}"

      - name: Cache Csound install
        id: cache-csound
        uses: actions/cache@v4
        with:
          path: .cache/csound-install
          key: ${{ runner.os }}-${{ env.CSOUND_CACHE_VERSION }}-${{ steps.csound-source.outputs.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CSOUND_CACHE_VERSION }}-

      - name: Validate Csound cache
        id: validate-csound-cache
        shell: pwsh
        run: |
          $P = $env:CSOUND_INSTALL_PREFIX
          $exe = @((Join-Path $P "bin\csound64.exe"), (Join-Path $P "bin\csound.exe")) | Where-Object { Test-Path $_ } | Select-Object -First 1
          $lib = @((Join-Path $P "lib\csound64.lib"), (Join-Path $P "lib64\csound64.lib"), (Join-Path $P "lib\csound.lib")) | Where-Object { Test-Path $_ } | Select-Object -First 1
          $dll = @((Join-Path $P "bin\csound64.dll")) | Where-Object { Test-Path $_ } | Select-Object -First 1
          $ok = 0; if ($exe -and $lib -and $dll) { $ok = 1 }
          "valid=$ok" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          if ($ok -eq 1) { Write-Host "Csound cache valid."; & $exe --version }
          else { Write-Host "Csound cache INVALID."; if (Test-Path $P) { Remove-Item -Recurse -Force $P } }

      - name: Checkout Csound
        uses: actions/checkout@v4
        with:
          repository: csound/csound
          ref: ${{ env.CSOUND_VERSION_REF }}
          path: csound-source
          submodules: recursive

      - name: Build and install Csound
        if: steps.validate-csound-cache.outputs.valid != '1'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Push-Location csound-source
          .\vcpkg\bootstrap-vcpkg.bat
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake -B build -S . `
            -G "${{ steps.detect-vs.outputs.generator }}" -A x64 `
            -DUSE_VCPKG=1 `
            -DCUSTOM_CMAKE="./platform/windows/Custom-vs.cmake" `
            -DBUILD_TESTS=OFF -DBUILD_STATIC_LIBRARY=OFF -DBUILD_MULTI_CORE=ON `
            -DBUILD_JAVA_INTERFACE=OFF -DBUILD_PYTHON_INTERFACE=OFF `
            -DINSTALL_PYTHON_INTERFACE=OFF -DBUILD_PYTHON_OPCODES=OFF `
            -DUSE_PYTHON=OFF -DUSE_DOUBLE=ON `
            -DCMAKE_INSTALL_PREFIX="$env:CSOUND_INSTALL_PREFIX"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build build --config Release --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --install build --config Release
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Pop-Location
          Get-ChildItem $env:CSOUND_INSTALL_PREFIX -Recurse -Depth 3 | Select-Object -First 200

      - name: Add Csound to environment
        shell: pwsh
        run: |
          $bin = Join-Path $env:CSOUND_INSTALL_PREFIX "bin"
          $lib = Join-Path $env:CSOUND_INSTALL_PREFIX "lib"
          $lib64 = Join-Path $env:CSOUND_INSTALL_PREFIX "lib64"
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          Add-Content -Path $env:GITHUB_ENV -Value "PATH=$bin;$lib;$lib64;$env:PATH"
          Add-Content -Path $env:GITHUB_ENV -Value "CSOUND_ROOT=$($env:CSOUND_INSTALL_PREFIX)"

      # ── Configure: CMAKE_PREFIX_PATH now includes runner vcpkg for curl ──
      - name: Configure CsoundVST3
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path build-windows) { Remove-Item -Recurse -Force build-windows }
          if (Test-Path dist)          { Remove-Item -Recurse -Force dist }

          $csoundExe = @(
            (Join-Path $env:CSOUND_INSTALL_PREFIX "bin\csound64.exe"),
            (Join-Path $env:CSOUND_INSTALL_PREFIX "bin\csound.exe")
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $csoundExe) { throw "csound executable not found" }

          $csoundLib = Get-ChildItem -Path $env:CSOUND_INSTALL_PREFIX -Recurse -Include @("csound64.lib","libcsound64.lib") -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $csoundLib) { throw "csound64.lib not found" }

          Write-Host "exe: $csoundExe"
          Write-Host "lib: $($csoundLib.FullName)"

          # Build CMAKE_PREFIX_PATH from all available sources
          $prefixPath = @($env:CSOUND_INSTALL_PREFIX)

          $csoundVcpkg = Join-Path $env:GITHUB_WORKSPACE "csound-source\vcpkg_installed\x64-windows"
          if (Test-Path $csoundVcpkg) {
            $prefixPath += $csoundVcpkg
            Write-Host "Adding Csound vcpkg: $csoundVcpkg"
          }

          $runnerVcpkg = "C:\vcpkg\installed\x64-windows"
          if (Test-Path $runnerVcpkg) {
            $prefixPath += $runnerVcpkg
            Write-Host "Adding runner vcpkg: $runnerVcpkg"
          }

          cmake -S CsoundVST3 -B build-windows `
            -G "${{ steps.detect-vs.outputs.generator }}" -A x64 `
            -DCMAKE_INSTALL_PREFIX="$env:GITHUB_WORKSPACE\dist" `
            -DCMAKE_PREFIX_PATH="$(($prefixPath -join ';'))" `
            -DCSOUND_ROOT_HINT="$env:CSOUND_INSTALL_PREFIX" `
            -DCSOUND_EXECUTABLE="$csoundExe" `
            -DCSOUND_LIBRARY="$($csoundLib.FullName)" `
            -DCSOUND_LIBRARIES="$($csoundLib.FullName)"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── Build ──
      - name: Build CsoundVST3
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake --build build-windows --config "${{ env.BUILD_TYPE }}" --parallel --target archive_dist
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── Verify ──
      - name: Verify dist contents
        shell: pwsh
        run: |
          Write-Host "=== dist/ directory ==="
          if (Test-Path dist) {
            Get-ChildItem dist -Recurse | ForEach-Object {
              $size = if ($_.PSIsContainer) { "<DIR>" } else { "$([math]::Round($_.Length / 1KB, 1)) KB" }
              $rel = $_.FullName.Replace("$env:GITHUB_WORKSPACE\dist\", "")
              Write-Host ("  {0,-70} {1}" -f $rel, $size)
            }
          } else {
            Write-Error "dist directory is empty!"
            exit 1
          }
          $vst3 = Get-ChildItem dist -Recurse -Filter "*.vst3" -ErrorAction SilentlyContinue
          if (-not $vst3) { Write-Error "No .vst3 found!"; exit 1 }
          Write-Host "`nVST3: $($vst3.FullName)"

      # ── Upload ──
      - name: Upload dist directory
        uses: actions/upload-artifact@v4
        with:
          name: csound-vst3-windows-dist
          path: dist/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload distribution archive
        uses: actions/upload-artifact@v4
        with:
          name: csound-vst3-windows-archive
          path: build-windows/csound-vst3-*-windows.zip
          retention-days: 14
          if-no-files-found: warn

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: csound-vst3-windows-diagnostics
          path: |
            build-windows/CMakeFiles/CMakeOutput.log
            build-windows/CMakeFiles/CMakeError.log
            build-windows/CMakeCache.txt
          retention-days: 7
